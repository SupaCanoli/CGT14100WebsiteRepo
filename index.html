<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CGT 14100 Project</title>
    <link rel="stylesheet" href="master.css">
</head>
<body>
    <div class="page-wrap">
        <header>
            <h1 class="login-title">Log In</h1>
        </header>

        <main class="login-panel">
            <form id="loginForm" action="login.php" method="post">
                <div class="form-row">
                    <label class="form-label" for="username">Username:</label>
                    <div class="input-area">
                        <input class="field" type="text" id="username" name="username" required aria-required="true" autocomplete="username">
                    </div>
                </div>

                <div class="form-row">
                    <label class="form-label" for="password">Password:</label>
                    <div class="input-area">
                        <div class="password-wrap">
                            <input class="field" type="password" id="password" name="password" required aria-required="true" autocomplete="current-password">
                        </div>
                        <div class="submit-wrap">
                            <button class="icon-submit" type="submit" aria-label="Submit login form">↪</button>
                        </div>
                    </div>
                </div>

                <input type="hidden" name="sourcePage" value="index-login">

                <p id="errorMessage" class="error-msg" aria-live="polite"></p>
            </form>
        </main>
    </div>

    <script>
        (function () {
            var form = document.getElementById("loginForm");
            var username = document.getElementById("username");
            var password = document.getElementById("password");
            var errorMessage = document.getElementById("errorMessage");

            form.addEventListener("submit", function (event) {
                var userValue = username.value.trim();
                var passValue = password.value.trim();

                if (!userValue || !passValue) {
                    event.preventDefault();
                    errorMessage.textContent = "Please fill out both username and password.";
                    if (!userValue) {
                        username.focus();
                    } else {
                        password.focus();
                    }
                    return;
                }

                errorMessage.textContent = "";
            });
        }());
    </script>
</body>
</html>
