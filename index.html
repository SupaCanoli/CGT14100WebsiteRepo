<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CGT 14100 Project</title>
    <style>
        :root {
            --bg: #37336e;
            --panel: #37336e;
            --accent: #2f9bff;
            --accent-soft: rgba(47, 155, 255, 0.75);
            --text: #46a8ff;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at top, #3f3a7f 0%, #37336e 55%);
            background-repeat: no-repeat;
            background-size: cover;
            color: var(--text);
        }

        .page-wrap {
            min-height: 100vh;
            padding: 44px 24px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-panel {
            width: 100%;
            max-width: 860px;
            background: var(--panel);
            border-radius: 14px;
            padding: 16px 18px 22px;
            display: table;
            table-layout: fixed;
        }

        .login-title {
            margin: 0 0 28px;
            text-align: center;
            color: var(--text);
            font-size: clamp(2rem, 2.9vw, 3rem);
            letter-spacing: 0.02em;
            text-shadow: 0 0 2px rgba(47, 155, 255, 0.35);
        }

        .form-row {
            margin-bottom: 18px;
        }

        .form-row::after {
            content: "";
            display: block;
            clear: both;
        }

        .form-label {
            float: left;
            width: 175px;
            margin: 7px 14px 0 0;
            font-size: clamp(2rem, 3.1vw, 3.1rem);
            line-height: 1;
            color: var(--text);
            text-align: right;
        }

        .input-area {
            float: left;
            width: calc(100% - 189px);
        }

        .field {
            width: 100%;
            height: 72px;
            border: 4px solid var(--accent);
            border-radius: 22px;
            background: transparent;
            color: var(--white);
            font-size: 1.65rem;
            padding: 10px 18px;
            outline: none;
        }

        .field:focus {
            border-color: #6cc0ff;
            box-shadow: 0 0 0 2px rgba(108, 192, 255, 0.2);
        }

        .password-wrap {
            float: left;
            width: calc(100% - 74px);
        }

        .submit-wrap {
            float: left;
            width: 58px;
            margin-left: 16px;
            margin-top: 13px;
        }

        .icon-submit {
            width: 58px;
            height: 58px;
            border: 4px solid var(--accent);
            border-radius: 13px;
            background: transparent;
            color: var(--text);
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }

        .icon-submit:hover,
        .icon-submit:focus {
            background-color: rgba(47, 155, 255, 0.16);
            transform: translateX(2px);
        }

        .options-row {
            margin: 4px 0 8px 191px;
            font-size: 1rem;
            color: #8ac5ff;
        }

        .remember-line {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-right: 16px;
        }

        .secondary-btn {
            border: 2px solid var(--accent-soft);
            background: transparent;
            color: var(--text);
            border-radius: 10px;
            padding: 7px 14px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .secondary-btn:hover,
        .secondary-btn:focus {
            background-color: rgba(47, 155, 255, 0.18);
        }

        .help-nav {
            margin-top: 16px;
            clear: both;
        }

        .help-links {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            justify-content: center;
        }

        .help-links a {
            display: inline-block;
            padding: 6px 10px;
            border: 1px solid transparent;
            border-radius: 8px;
            color: #9fd2ff;
            text-decoration: none;
        }

        .help-links a:hover,
        .help-links a:focus {
            border-color: var(--accent-soft);
            background: rgba(47, 155, 255, 0.12);
        }

        .error-msg {
            margin: 8px 0 0 191px;
            color: #ffd4e5;
            min-height: 1.3em;
        }

        #help-section {
            max-width: 860px;
            width: 100%;
            margin-top: 18px;
            color: #9bd0ff;
            font-size: 0.95rem;
            text-align: center;
            padding: 10px 12px;
        }

        @media (max-width: 760px) {
            .page-wrap {
                padding: 18px 10px;
                justify-content: flex-start;
            }

            .login-panel {
                padding: 20px 10px 14px;
            }

            .form-label {
                float: none;
                width: 100%;
                margin: 0 0 8px;
                text-align: left;
                font-size: clamp(1.7rem, 8vw, 2.2rem);
            }

            .input-area,
            .password-wrap {
                float: none;
                width: 100%;
            }

            .field {
                height: 62px;
                border-width: 3px;
                font-size: 1.25rem;
            }

            .submit-wrap {
                float: none;
                width: 100%;
                margin: 10px 0 0;
            }

            .icon-submit {
                width: 100%;
                height: 55px;
                border-radius: 12px;
                font-size: 1.4rem;
            }

            .options-row,
            .error-msg {
                margin-left: 0;
            }

            .help-links {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <header>
            <h1 class="login-title">Log In</h1>
        </header>

        <main class="login-panel">
            <form id="loginForm" action="login.php" method="post">
                <div class="form-row">
                    <label class="form-label" for="username">Username:</label>
                    <div class="input-area">
                        <input class="field" type="text" id="username" name="username" required aria-required="true" autocomplete="username">
                    </div>
                </div>

                <div class="form-row">
                    <label class="form-label" for="password">Password:</label>
                    <div class="input-area">
                        <div class="password-wrap">
                            <input class="field" type="password" id="password" name="password" required aria-required="true" autocomplete="current-password">
                        </div>
                        <div class="submit-wrap">
                            <button class="icon-submit" type="submit" aria-label="Submit login form">↪</button>
                        </div>
                    </div>
                </div>

                <div class="options-row">
                    <label class="remember-line" for="remember">
                        <input id="remember" name="remember" type="checkbox">
                        Remember me
                    </label>
                    <button class="secondary-btn" type="reset">Clear</button>
                    <input type="hidden" name="sourcePage" value="index-login">
                </div>

                <p id="errorMessage" class="error-msg" aria-live="polite"></p>
            </form>

            <nav class="help-nav" aria-label="Quick links">
                <ul class="help-links">
                    <li><a href="about.html">About (Intrasite)</a></li>
                    <li><a href="contact.html">Contact (Intrasite)</a></li>
                    <li><a href="#help-section">Help on this page</a></li>
                    <li><a href="https://www.purdue.edu" target="_blank" rel="noopener noreferrer">Purdue (Extrasite)</a></li>
                </ul>
            </nav>
        </main>

        <section id="help-section" aria-label="Login help">
            Enter a username and password, then use the arrow button to submit.
        </section>
    </div>

    <script>
        (function () {
            var form = document.getElementById("loginForm");
            var username = document.getElementById("username");
            var password = document.getElementById("password");
            var errorMessage = document.getElementById("errorMessage");

            form.addEventListener("submit", function (event) {
                var userValue = username.value.trim();
                var passValue = password.value.trim();

                if (!userValue || !passValue) {
                    event.preventDefault();
                    errorMessage.textContent = "Please fill out both username and password.";
                    if (!userValue) {
                        username.focus();
                    } else {
                        password.focus();
                    }
                    return;
                }

                errorMessage.textContent = "";
            });
        }());
    </script>
</body>
</html>
